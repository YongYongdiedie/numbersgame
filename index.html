<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>숫자 탭 게임</title>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #e8e8e5;
  --text: #1a1a1a; --text2: #666660;
  --border: rgba(0,0,0,0.13); --border2: rgba(0,0,0,0.22);
  --success-bg: #eaf3de; --success-border: rgba(59,109,17,0.3); --success-text: #27500a;
  --danger: #e24b4a; --info: #185fa5;
  --gold: #ba7517; --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f2f2f7; --text2: #8e8e93;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --success-bg: #173404; --success-border: rgba(150,210,80,0.25); --success-text: #c0dd97;
    --danger: #ff6b6b; --info: #64a8f0; --gold: #f0a500;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overscroll-behavior: none;
}
#app { max-width: 420px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* ── 공통 버튼 ── */
.btn-primary {
  display: block; width: 100%; padding: 14px;
  font-size: 16px; font-weight: 600;
  border-radius: var(--radius-sm);
  border: none; background: var(--text); color: var(--bg);
  cursor: pointer; touch-action: manipulation;
}
.btn-primary:active { opacity: 0.75; transform: scale(0.98); }
.btn-secondary {
  display: block; width: 100%; padding: 13px;
  font-size: 15px; font-weight: 500;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2); background: var(--bg); color: var(--text);
  cursor: pointer; touch-action: manipulation;
}
.btn-secondary:active { background: var(--bg3); }

/* ══════════════════════════════
   화면 1 : 닉네임 입력
══════════════════════════════ */
#screen-nick {
  display: flex; flex-direction: column; align-items: center;
  padding-top: 3.5rem; gap: 0;
}
.game-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.game-sub   { font-size: 14px; color: var(--text2); margin-bottom: 2.5rem; text-align: center; }
#nick-input {
  width: 100%; max-width: 300px; font-size: 17px;
  padding: 12px 14px; margin-bottom: 14px;
  border-radius: var(--radius-sm); border: 0.5px solid var(--border2);
  background: var(--bg); color: var(--text); outline: none;
  -webkit-appearance: none;
}
#nick-input:focus { border-color: var(--info); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
#nick-ok { max-width: 300px; }

/* ══════════════════════════════
   화면 2 : 게임 플레이
══════════════════════════════ */
#screen-game { display: none; }
#header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
#nick-badge { flex: 1; font-size: 14px; color: var(--text2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#timer { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 86px; text-align: right; }
#start-btn {
  padding: 9px 18px; font-size: 15px; font-weight: 600;
  border-radius: var(--radius-sm); border: 0.5px solid var(--border2);
  background: var(--bg); color: var(--text);
  cursor: pointer; touch-action: manipulation; flex-shrink: 0; white-space: nowrap;
}
#start-btn:active { background: var(--bg3); }
#start-btn:disabled { opacity: 0.35; }
#countdown { height: 72px; display: flex; align-items: center; justify-content: center; font-size: 58px; font-weight: 700; }
#grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
.card {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 600;
  border-radius: var(--radius); border: 0.5px solid var(--border2);
  background: var(--bg); color: var(--text);
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation; cursor: pointer;
  transition: transform 0.08s, background 0.08s;
}
.card:active { transform: scale(0.92); background: var(--bg3); }
.card.done { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); cursor: default; }
.card.done:active { transform: none; }
.card.hidden { color: transparent !important; cursor: default; pointer-events: none; }
.card.wrong { animation: shake .38s; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)}
  40%{transform:translateX(9px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
}
#msg { min-height: 20px; font-size: 13px; color: var(--danger); text-align: center; margin-bottom: 0.75rem; font-weight: 500; }

/* ══════════════════════════════
   화면 3 : 결과 팝업 오버레이
══════════════════════════════ */
#screen-result {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
#screen-result.show { display: flex; }
#result-sheet {
  background: var(--bg); width: 100%; max-width: 480px;
  border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem 2.5rem;
  max-height: 92vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* 내 기록 */
.result-my { text-align: center; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
.result-my .r-lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.result-my .r-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.result-my .r-time { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 8px; }
.result-my .r-rank { font-size: 14px; color: var(--text2); }
.result-my .r-rank strong { color: var(--info); font-size: 18px; }

/* 랭킹 */
.lb-header { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; margin-bottom: 0.75rem; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 0.5px solid var(--border); font-size: 15px; }
.lb-row:last-child { border-bottom: none; }
.lb-rank { width: 28px; text-align: center; font-weight: 700; color: var(--text2); flex-shrink: 0; font-size: 14px; }
.lb-rank.gold { color: var(--gold); font-size: 18px; }
.lb-rank.silver { color: #888; font-size: 18px; }
.lb-rank.bronze { color: #a0522d; font-size: 18px; }
.lb-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-time { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }
.lb-row.me { background: rgba(24,95,165,0.07); border-radius: 8px; margin: 2px -4px; padding: 8px 8px; }
.lb-row.me .lb-name, .lb-row.me .lb-time { color: var(--info); }
.lb-row.me .lb-rank { color: var(--info); }

/* 버튼 */
.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; }
#lb-status { font-size: 12px; color: var(--text2); text-align: center; min-height: 18px; margin-bottom: 0.25rem; }
#lb-loading { text-align: center; padding: 1.5rem 0; font-size: 14px; color: var(--text2); }
</style>
</head>
<body>
<div id="app">

  <!-- 화면 1: 닉네임 입력 -->
  <div id="screen-nick">
    <div class="game-title">숫자 탭 게임</div>
    <div class="game-sub">1부터 9까지 순서대로 빠르게 눌러보세요</div>
    <input id="nick-input" type="text" maxlength="12" placeholder="닉네임 입력 (최대 12자)"
      autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="nick-ok" class="btn-primary">시작하기</button>
  </div>

  <!-- 화면 2: 게임 플레이 -->
  <div id="screen-game">
    <div id="header">
      <span id="nick-badge"></span>
      <div id="timer">00.00</div>
      <button id="start-btn">시작</button>
    </div>
    <div id="countdown"></div>
    <div id="grid"></div>
    <div id="msg"></div>
  </div>

</div>

<!-- 화면 3: 결과 팝업 (fixed overlay) -->
<div id="screen-result">
  <div id="result-sheet">
    <div class="result-my">
      <div class="r-lbl">내 기록</div>
      <div class="r-name" id="r-name"></div>
      <div class="r-time" id="r-time">—</div>
      <div class="r-rank" id="r-rank"></div>
    </div>
    <div class="lb-header">랭킹 TOP 10</div>
    <div id="lb-loading">불러오는 중...</div>
    <div id="lb-rows"></div>
    <div id="lb-status"></div>
    <div class="result-actions">
      <button id="btn-again" class="btn-primary">같은 닉네임으로 다시 도전</button>
      <button id="btn-new" class="btn-secondary">닉네임 변경 후 다시 시작</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJo2oGZEwzjrIoT4iTV6RtUznFIZv9WBI",
  authDomain: "number-test-game-c8fd4.firebaseapp.com",
  databaseURL: "https://number-test-game-c8fd4-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "number-test-game-c8fd4",
  storageBucket: "number-test-game-c8fd4.firebasestorage.app",
  messagingSenderId: "318040013546",
  appId: "1:318040013546:web:7cdd233e8a13655249f593"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.fbSave = async (name, ms) => {
  const msInt = Math.round(ms);
  await push(ref(db, 'scores'), { name, ms: msInt, t: Date.now() });
  return msInt;
};

window.fbLoadTop10 = async () => {
  const snap = await get(ref(db, 'scores'));
  if (!snap.exists()) return [];
  const rows = [];
  snap.forEach(c => rows.push(c.val()));
  rows.sort((a, b) => a.ms - b.ms);
  return rows.slice(0, 10);
};
</script>

<script>
const $ = id => document.getElementById(id);

/* ── 상태 ── */
let nickname = '';
let cards = [];
let nextExp = 1;
let timerInt = null;
let startMs = null;
let elapsed = 0;
let gameActive = false;

/* ── 유틸 ── */
function fmt(ms) {
  const s  = Math.floor(ms / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return String(s).padStart(2,'0') + '.' + String(cs).padStart(2,'0');
}
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function stopTimer() { clearInterval(timerInt); timerInt = null; }
function delay(ms)   { return new Promise(r => setTimeout(r, ms)); }

/* ── 화면 전환 ── */
function showNick() {
  $('screen-nick').style.display = 'flex';
  $('screen-game').style.display = 'none';
  $('screen-result').classList.remove('show');
  $('nick-input').value = '';
  setTimeout(() => $('nick-input').focus(), 100);
}
function showGame() {
  $('screen-nick').style.display = 'none';
  $('screen-game').style.display = 'block';
  $('screen-result').classList.remove('show');
}
function showResult() {
  $('screen-result').classList.add('show');
}

/* ── 닉네임 입력 ── */
$('nick-ok').addEventListener('click', () => {
  const v = $('nick-input').value.trim();
  if (!v) { $('nick-input').focus(); return; }
  nickname = v;
  showGame();
  $('nick-badge').textContent = nickname;
  buildGrid(false);
  $('start-btn').disabled = false;
  $('msg').textContent = '';
  stopTimer(); elapsed = 0;
  $('timer').textContent = '00.00';
  $('countdown').textContent = '';
});
$('nick-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('nick-ok').click(); });

/* ── 그리드 ── */
function buildGrid(hidden) {
  const grid = $('grid');
  grid.innerHTML = ''; cards = [];
  shuffle([1,2,3,4,5,6,7,8,9]).forEach(n => {
    const d = document.createElement('div');
    d.className = 'card' + (hidden ? ' hidden' : '');
    d.textContent = n;
    d.dataset.num = n;
    const tap = e => { e.preventDefault(); onCard(d, n); };
    d.addEventListener('touchend', tap, { passive: false });
    d.addEventListener('click', tap);
    grid.appendChild(d);
    cards.push(d);
  });
}

/* ── 카드 탭 ── */
function onCard(d, n) {
  if (!gameActive) return;
  if (n !== nextExp) {
    d.classList.add('wrong');
    setTimeout(() => d.classList.remove('wrong'), 380);
    $('msg').textContent = '틀렸어요! 처음부터 다시 시작합니다...';
    gameActive = false;
    stopTimer();
    setTimeout(() => resetGame(), 950);
    return;
  }
  d.classList.add('done');
  nextExp++;
  if (nextExp > 9) endGame();
}

/* ── 게임 리셋 (시작 버튼 대기 상태) ── */
function resetGame() {
  nextExp = 1; gameActive = false;
  stopTimer(); elapsed = 0;
  $('timer').textContent = '00.00';
  $('msg').textContent = '';
  $('countdown').textContent = '';
  buildGrid(false);
  $('start-btn').disabled = false;
}

/* ── 게임 시작 ── */
async function startGame() {
  $('start-btn').disabled = true;
  $('msg').textContent = '';
  nextExp = 1; stopTimer(); elapsed = 0;
  $('timer').textContent = '00.00';
  buildGrid(true);

  const cd = $('countdown');
  for (const s of ['3','2','1','시작!']) {
    cd.textContent = s;
    await delay(s === '시작!' ? 700 : 820);
  }
  cd.textContent = '';
  cards.forEach(c => c.classList.remove('hidden'));
  gameActive = true;
  startMs = performance.now();
  timerInt = setInterval(() => {
    elapsed = performance.now() - startMs;
    $('timer').textContent = fmt(elapsed);
  }, 30);
}

/* ── 게임 종료 ── */
async function endGame() {
  gameActive = false; stopTimer();
  const finalMs = elapsed;

  // 결과 팝업 즉시 표시
  $('r-name').textContent = nickname;
  $('r-time').textContent = fmt(finalMs);
  $('r-rank').textContent = '';
  $('lb-rows').innerHTML = '';
  $('lb-loading').style.display = 'block';
  $('lb-loading').textContent = '기록 저장 중...';
  $('lb-status').textContent = '';
  showResult();

  // Firebase 저장 & 랭킹 로드
  try {
    const savedMs = await window.fbSave(nickname, finalMs);
    $('lb-loading').textContent = '랭킹 불러오는 중...';

    const top10 = await window.fbLoadTop10();
    $('lb-loading').style.display = 'none';
    renderRanking(top10, nickname, savedMs);
  } catch(e) {
    console.error(e);
    $('lb-loading').textContent = '네트워크 오류 — 랭킹을 불러올 수 없습니다';
  }
}

/* ── 랭킹 렌더링 ── */
function renderRanking(rows, myName, myMs) {
  if (!rows || rows.length === 0) {
    $('lb-rows').innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text2);font-size:14px;">아직 기록이 없습니다</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['gold','silver','bronze'];
  let myRank = -1;

  const html = rows.map((r, i) => {
    const isMe = r.name === myName && Math.round(r.ms) === myMs;
    if (isMe) myRank = i + 1;
    const rankLabel = i < 3 ? medals[i] : (i + 1);
    const rankCls   = i < 3 ? rankClasses[i] : '';
    return `<div class="lb-row${isMe ? ' me' : ''}">
      <span class="lb-rank ${rankCls}">${rankLabel}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-time">${fmt(r.ms)}</span>
    </div>`;
  }).join('');

  $('lb-rows').innerHTML = html;

  if (myRank > 0) {
    $('r-rank').innerHTML = `<strong>${myRank}위</strong> / ${rows.length >= 10 ? '10위권' : rows.length + '명 중'}`;
  } else {
    $('r-rank').innerHTML = `10위권 밖`;
  }
}

/* ── 결과 버튼 ── */
// 같은 닉네임으로 재도전
$('btn-again').addEventListener('click', () => {
  $('screen-result').classList.remove('show');
  showGame();
  resetGame();
});

// 닉네임 변경 (첫 화면으로)
$('btn-new').addEventListener('click', () => {
  showNick();
});

// 게임 시작 버튼
$('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
